name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, mysql, sqlite3
          coverage: none

      - name: Install Composer Dependencies
        run: |
          cd backend
          composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Run PHP Syntax Check
        run: |
          cd backend
          find app bootstrap config database routes tests -name '*.php' -print0 | xargs -0 -n 1 php -l

      - name: Run Backend Tests
        run: |
          cd backend
          cp .env.example .env
          php artisan key:generate
          DB_CONNECTION=sqlite DB_DATABASE=:memory: php artisan test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - name: Run TypeScript Type Check
        run: npm run typecheck

      - name: Run Frontend Build
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Trigger Coolify Deploy
        run: |
          RESPONSE=$(curl -s -X GET "https://coolify.virtuenet.space/api/v1/deploy?uuid=aps4zkidae9b54ogoz8uc6z4&force=true" \
               -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")
          
          DEPLOYMENT_UUID=$(echo "$RESPONSE" | jq -r '.deployments[0].deployment_uuid')
          if [ -z "$DEPLOYMENT_UUID" ] || [ "$DEPLOYMENT_UUID" = "null" ]; then
            echo "Failed to extract deployment UUID from response: $RESPONSE"
            exit 1
          fi
          
          echo "Deployment triggered successfully! UUID: $DEPLOYMENT_UUID"
          echo "Watching deployment status..."
          
          while true; do
            STATUS_RESPONSE=$(curl -s -X GET "https://coolify.virtuenet.space/api/v1/deployments/$DEPLOYMENT_UUID" \
                 -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")
            STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status')
            
            if [ "$STATUS" = "finished" ]; then
              echo "Deployment completed successfully!"
              exit 0
            elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "cancelled" ]; then
              echo "Deployment failed or was cancelled. Status: $STATUS"
              exit 1
            fi
            
            echo "Current status: $STATUS. Waiting 15 seconds..."
            sleep 15
          done
